name: Snyk

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "31 2 * * 1"

permissions:
  contents: read

jobs:
  monitor-and-test:
    name: monitor-and-test
    runs-on: ubuntu-latest
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Snyk test
        uses: snyk/actions/node@master
        continue-on-error: false
        with:
          command: test
          args: --severity-threshold=high

      - name: Snyk monitor
        uses: snyk/actions/node@master
        continue-on-error: true
        with:
          command: monitor