name: Snyk

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "31 2 * * 1"

permissions:
  contents: read

jobs:
  monitor-and-test:
    name: monitor-and-test
    runs-on: ubuntu-latest
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install deps
        run: npm ci

      # snyk/actions/node não suporta `working-directory` — ele varre a partir de
      # $GITHUB_WORKSPACE, então aponta explicitamente para o manifest em app/.
      - name: Snyk test
        uses: snyk/actions/node@master
        continue-on-error: false
        with:
          command: test
          args: --severity-threshold=high --file=app/package.json

      - name: Snyk monitor
        uses: snyk/actions/node@master
        continue-on-error: true
        with:
          command: monitor
          args: --file=app/package.json